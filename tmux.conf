# -- general -------------------------------------------------------------------

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -s escape-time 10
set -sg repeat-time 600
set -s focus-events on

set -g prefix C-b
set -g prefix2 C-a
bind C-a send-prefix -2

set -g history-limit 10000

set -q -g status-utf8 on
setw -q -g utf8 on

set -g mouse on

# -- display -------------------------------------------------------------------

set -g base-index 1
setw -g pane-base-index 1

setw -g automatic-rename on
set -g renumber-windows on

set -g set-titles on
set -g display-panes-time 800
set -g display-time 1000

set -g status-interval 10

set -g monitor-activity on
set -g visual-activity off

# -- navigation ----------------------------------------------------------------

# sessions
bind C-c new-session
bind C-f command-prompt -p find-session 'switch-client -t %%'
bind BTab switch-client -l

# windows
unbind n
unbind p
bind -r C-h previous-window
bind -r C-l next-window
bind Tab last-window

# pane splits
bind - split-window -v -c '#{pane_current_path}'
bind _ split-window -h -c '#{pane_current_path}'

# pane navigation
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind > swap-pane -D
bind < swap-pane -U

# pane resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# zoom / maximize
bind z resize-pane -Z
bind + resize-pane -Z

# -- copy mode -----------------------------------------------------------------

set -g mode-keys vi

bind Enter copy-mode

bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H   send -X start-of-line
bind -T copy-mode-vi L   send -X end-of-line

if -b 'command -v pbcopy > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | pbcopy"'

# -- bindings ------------------------------------------------------------------

bind r source-file ~/.tmux.conf \; display "config reloaded"
bind e new-window -n "tmux.conf" sh -c '${EDITOR:-vim} ~/.tmux.conf'
bind m run 'old=$(tmux show -gv mouse); tmux set -g mouse $([ "$old" = "on" ] && echo off || echo on)'

bind -n C-l send-keys C-l \; run 'sleep 0.2' \; clear-history

# -- theme: Ayu Mirage ---------------------------------------------------------

bg="#1f2430"
fg="#cccac2"
gray="#707a8c"
teal="#24ffb6"
yellow="#ffd173"
blue="#12b0ff"
pink="#ff246d"

# status bar
set -g status on
set -g status-justify left
set -g status-position bottom
set -g status-style "fg=$fg,bg=$bg"

# left: session name
set -g status-left-length 40
set -g status-left "#[fg=$bg,bg=$yellow,bold] #S #[fg=$yellow,bg=$bg,nobold]"

# right: time and date
set -g status-right-length 40
set -g status-right "#[fg=$gray] %R  %d %b "

# window tabs
setw -g window-status-style "fg=$gray,bg=$bg"
setw -g window-status-format " #I #W "
setw -g window-status-current-style "fg=$bg,bg=$teal,bold"
setw -g window-status-current-format " #I #W "
setw -g window-status-separator ""

# pane borders
set -g pane-border-style "fg=$gray"
set -g pane-active-border-style "fg=$teal"

# messages
set -g message-style "fg=$bg,bg=$pink,bold"
set -g message-command-style "fg=$pink,bg=$bg"

# copy mode highlight
setw -g mode-style "fg=$bg,bg=$pink,bold"

# clock (prefix + t)
set -g clock-mode-colour "$teal"
set -g clock-mode-style 24
